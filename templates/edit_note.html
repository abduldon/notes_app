{% extends "base.html" %}

{% block content %}
<div class="page-header mb-4">
    <div>
        <h2>Edit Note</h2>
        <p class="text-muted">Update the content and save your changes.</p>
    </div>
</div>

<div class="card shadow-sm note-card">
    <div class="card-body">
        <form action="{{ url_for('notes.edit_note', note_id=note.id) }}" method="POST">
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" name="title" class="form-control" value="{{ note.title }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Note</label>
                <textarea name="description" class="form-control" rows="5" required>{{ note.description }}</textarea>
            </div>
            <button class="btn btn-primary">Update Note</button>
            <a href="{{ url_for('notes.notes_index') }}" class="btn btn-link">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
