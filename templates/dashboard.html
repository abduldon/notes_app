{% extends "base.html" %}

{% block content %}

<div class="page-header mb-4">
    <div>
        <h2>Welcome back, {{ session.get('username') }}</h2>
        <p class="text-muted">Use your note board to add, edit, or delete notes.</p>
    </div>
</div>

<div class="card shadow-sm note-card p-4">
    <p class="mb-3">Your workspace is ready. Click the button below to manage your note collection.</p>
    <a class="btn btn-primary" href="{{ url_for('notes.notes_index') }}">Open Notes</a>
</div>

{% endblock %}
